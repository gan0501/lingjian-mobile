name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type: release or debug'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install CocoaPods
        working-directory: ios
        run: |
          gem install cocoapods
          pod install

      - name: Install signing certificate
        id: signing
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$P12_BASE64" | base64 --decode > $CERTIFICATE_PATH
          echo "$PROVISION_BASE64" | base64 --decode > $PP_PATH

          security create-keychain -p actions $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p actions $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k actions $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i $PP_PATH)")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$(security cms -D -i $PP_PATH)")

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          echo "uuid=$PP_UUID" >> $GITHUB_OUTPUT
          echo "name=$PP_NAME" >> $GITHUB_OUTPUT
          echo "Provisioning Profile UUID: $PP_UUID"
          echo "Provisioning Profile Name: $PP_NAME"

      - name: Build IPA (Release)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: ios
        run: |
          xcodebuild -workspace LingjianAI.xcworkspace \
            -scheme LingjianAI \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/LingjianAI.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.IOS_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.signing.outputs.uuid }}" \
            CODE_SIGN_IDENTITY="Apple Distribution"

          xcodebuild -exportArchive \
            -archivePath build/LingjianAI.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist ExportOptions.plist

      - name: Build IPA (Debug)
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: ios
        run: |
          xcodebuild -workspace LingjianAI.xcworkspace \
            -scheme LingjianAI \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -archivePath build/LingjianAI.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.IOS_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.signing.outputs.uuid }}" \
            CODE_SIGN_IDENTITY="Apple Development"

          xcodebuild -exportArchive \
            -archivePath build/LingjianAI.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist ExportOptions-Debug.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingjianAI-${{ github.event.inputs.build_type }}.ipa
          path: ios/build/output/*.ipa

      - name: Clean up keychain
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          fi
