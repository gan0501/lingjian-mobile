// ============ 生成剖面图 ============
function generateSectionDrawing() {
  if (!state.sectionLine) return;
  const sl = state.sectionLine;

  const sc = document.getElementById('sectionCanvas');
  const sctx = sc.getContext('2d');
  const sw = sc.parentElement.clientWidth - 16;
  const sh = sc.parentElement.clientHeight - 40;
  sc.width = sw * devicePixelRatio;
  sc.height = sh * devicePixelRatio;
  sc.style.width = sw + 'px';
  sc.style.height = sh + 'px';
  sctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  sctx.fillStyle = '#0f0f23';
  sctx.fillRect(0, 0, sw, sh);

  const slDx = sl.x2 - sl.x1, slDz = sl.z2 - sl.z1;
  const slLen = Math.hypot(slDx, slDz);
  if (slLen < 1) return;
  const slNx = slDx / slLen, slNz = slDz / slLen;

  const slabThk = state.slabThickness;
  const slabMemThk = state.slabMembraneThk;

  const CF = '#4a8fe7';
  const CF_FILL = '#6aaaf0';
  const MF = '#ffc107';
  const MF_FILL = '#ffd54f';
  const BG = '#0f0f23';

  let maxDepthMm = 0;
  for (const p of state.pits) {
    const d = Math.abs(p.topElev - p.bottomElev) * 1000 + p.bottomThk + p.bottomMembraneThk;
    maxDepthMm = Math.max(maxDepthMm, d);
  }
  const totalDepthMm = maxDepthMm + slabThk + slabMemThk;

  const pad = 50;

  function clipperPathToProjections(paths) {
    const intervals = [];
    for (const path of paths) {
      const projs = [];
      for (const pt of path) {
        const x = pt.X / CLIPPER_SCALE;
        const z = pt.Y / CLIPPER_SCALE;
        const proj = (x - sl.x1) * slNx + (z - sl.z1) * slNz;
        projs.push(proj);
      }
      if (projs.length < 2) continue;
      projs.sort((a, b) => a - b);
      intervals.push({ left: projs[0], right: projs[projs.length - 1] });
    }
    return intervals;
  }

  function mergeIntervals(intervals) {
    if (intervals.length === 0) return [];
    const sorted = intervals.slice().sort((a, b) => a.left - b.left);
    const merged = [sorted[0]];
    for (let i = 1; i < sorted.length; i++) {
      const last = merged[merged.length - 1];
      if (sorted[i].left <= last.right) {
        last.right = Math.max(last.right, sorted[i].right);
      } else {
        merged.push({ left: sorted[i].left, right: sorted[i].right });
      }
    }
    return merged;
  }

  function subtractIntervals(base, holes) {
    let result = base.slice();
    for (const hole of holes) {
      const next = [];
      for (const seg of result) {
        if (hole.right <= seg.left || hole.left >= seg.right) {
          next.push(seg);
        } else {
          if (hole.left > seg.left) next.push({ left: seg.left, right: hole.left });
          if (hole.right < seg.right) next.push({ left: hole.right, right: seg.right });
        }
      }
      result = next;
    }
    return result;
  }

  const allCavityRaw = [];
  const allConcreteRaw = [];
  const allMembraneRaw = [];
  const pitDepths = [];

  for (const pit of state.pits) {
    const cavityPath = [pitToClipperPath(pit)];
    const concreteOutline = clipperOffset(cavityPath, pit.wallThk);
    const membraneOutline = clipperOffset(concreteOutline, pit.membraneThk);

    for (const cp of cavityPath) allCavityRaw.push(cp);
    for (const cp of concreteOutline) allConcreteRaw.push(cp);
    for (const mp of membraneOutline) allMembraneRaw.push(mp);

    const depthMm = Math.abs(pit.topElev - pit.bottomElev) * 1000;
    pitDepths.push({ pit, depthMm });
  }

  const allCavityPaths = clipperUnion(allCavityRaw);
  const allConcretePaths = clipperUnion(allConcreteRaw);
  const allMembranePaths = clipperUnion(allMembraneRaw);

  const cavityIntervals = mergeIntervals(clipperPathToProjections(allCavityPaths));
  const concreteIntervals = mergeIntervals(clipperPathToProjections(allConcretePaths));
  const membraneIntervals = mergeIntervals(clipperPathToProjections(allMembranePaths));

  let maxPitDepth = 0;
  let maxBottomThk = 0;
  let maxBottomMemThk = 0;
  for (const pd of pitDepths) {
    maxPitDepth = Math.max(maxPitDepth, pd.depthMm - slabThk);
    maxBottomThk = Math.max(maxBottomThk, pd.pit.bottomThk);
    maxBottomMemThk = Math.max(maxBottomMemThk, pd.pit.bottomMembraneThk);
  }

  let slabProjLeft = Infinity, slabProjRight = -Infinity;
  for (const iv of membraneIntervals) {
    slabProjLeft = Math.min(slabProjLeft, iv.left);
    slabProjRight = Math.max(slabProjRight, iv.right);
  }
  if (slabProjLeft === Infinity) { slabProjLeft = 0; slabProjRight = slLen; }
  const slabExt = 200;
  slabProjLeft -= slabExt;
  slabProjRight += slabExt;

  const projCenter = (slabProjLeft + slabProjRight) / 2;
  const projRange = slabProjRight - slabProjLeft;
  const drawW = sw - pad * 2;
  const drawH = sh - pad * 2;
  const scale = Math.min(drawW / projRange, drawH / totalDepthMm) * 0.85;

  function projToX(proj) { return Math.round(sw / 2 + (proj - projCenter) * scale); }

  const slabTopY = Math.round(sh / 2 - (totalDepthMm / 2) * scale);
  const slabH = Math.round(slabThk * scale);
  const slabMemH = Math.round(slabMemThk * scale);
  const slabBottomY = slabTopY + slabH;
  const slabMemTopY = slabBottomY;

  const slabLeftX = projToX(slabProjLeft);
  const slabRightX = projToX(slabProjRight);
  const slabDrawW = slabRightX - slabLeftX;

  const pitDepthPx = Math.round(maxPitDepth * scale);
  const bottomThkPx = Math.round(maxBottomThk * scale);
  const bottomMemThkPx = Math.round(maxBottomMemThk * scale);
  const pitBottomY = slabBottomY + pitDepthPx;

  // ========= PASS 1: 膜层（最低优先级，最先画）=========
  sctx.fillStyle = MF_FILL;
  sctx.strokeStyle = MF;
  sctx.lineWidth = 1.5;

  // 底板底膜（全宽一薄层）
  const slabMemHoles = subtractIntervals([{ left: slabProjLeft, right: slabProjRight }], membraneIntervals);
  for (const seg of slabMemHoles) {
    const lx = projToX(seg.left), rx = projToX(seg.right);
    sctx.fillRect(lx, slabMemTopY, rx - lx, slabMemH);
    sctx.strokeRect(lx, slabMemTopY, rx - lx, slabMemH);
  }

  // 坑体膜（从底板底开始，不含底板底膜，避免叠加）
  for (const seg of membraneIntervals) {
    const lx = projToX(seg.left), rx = projToX(seg.right);
    sctx.fillRect(lx, slabBottomY, rx - lx, pitDepthPx + bottomThkPx + bottomMemThkPx);
    sctx.strokeRect(lx, slabBottomY, rx - lx, pitDepthPx + bottomThkPx + bottomMemThkPx);
  }

  // ========= PASS 2: 混凝土层（中优先级，覆盖膜）=========
  sctx.fillStyle = CF_FILL;
  sctx.strokeStyle = CF;
  sctx.lineWidth = 2;

  // 底板区域：全宽减空腔
  const allConcreteBase = [{ left: slabProjLeft, right: slabProjRight }];
  const concreteBaseIntervals = subtractIntervals(allConcreteBase, cavityIntervals);
  for (const seg of concreteBaseIntervals) {
    const lx = projToX(seg.left), rx = projToX(seg.right);
    sctx.fillRect(lx, slabTopY, rx - lx, slabH);
  }

  // 坑体区域：只填充，不描边（与底板一体）
  for (const seg of concreteIntervals) {
    const lx = projToX(seg.left), rx = projToX(seg.right);
    sctx.fillRect(lx, slabBottomY, rx - lx, pitDepthPx + bottomThkPx);
  }

  // 统一外轮廓描边（不分段）
  sctx.beginPath();
  if (concreteBaseIntervals.length > 0) {
    const first = concreteBaseIntervals[0];
    const last = concreteBaseIntervals[concreteBaseIntervals.length - 1];
    const flx = projToX(first.left), frx = projToX(last.right);
    sctx.moveTo(flx, slabTopY); sctx.lineTo(frx, slabTopY); sctx.lineTo(frx, slabBottomY + pitDepthPx + bottomThkPx); sctx.lineTo(flx, slabBottomY + pitDepthPx + bottomThkPx); sctx.closePath();
  }
  sctx.stroke();

  // ========= PASS 3: 空腔层（最高优先级，覆盖一切）=========
  for (const seg of cavityIntervals) {
    const lx = projToX(seg.left), rx = projToX(seg.right);
    sctx.fillStyle = BG;
    sctx.fillRect(lx, slabTopY, rx - lx, slabH + pitDepthPx);
    sctx.strokeStyle = CF;
    sctx.lineWidth = 1;
    sctx.beginPath();
    sctx.moveTo(lx, slabTopY); sctx.lineTo(lx, slabBottomY + pitDepthPx);
    sctx.moveTo(rx, slabTopY); sctx.lineTo(rx, slabBottomY + pitDepthPx);
    sctx.stroke();
  }

  for (const seg of cavityIntervals) {
    const lx = projToX(seg.left), rx = projToX(seg.right);
    sctx.fillStyle = BG;
    sctx.fillRect(lx, slabMemTopY, rx - lx, slabMemH);
  }

  // ========= PASS 4: 标注层 =========
  sctx.fillStyle = CF;
  sctx.font = '10px Microsoft YaHei';
  sctx.textAlign = 'left';
  sctx.fillText('底板 ' + slabThk + 'mm', slabLeftX + 4, slabTopY + slabH / 2 + 4);

  sctx.fillStyle = MF;
  sctx.font = '9px Microsoft YaHei';
  sctx.fillText('底膜 ' + slabMemThk + 'mm', slabLeftX + 4, slabMemTopY + slabMemH / 2 + 3);

  drawElevMark(sctx, slabLeftX - 5, slabTopY, state.pits[0]?.topElev ?? 0, CF);

  // 绘制坑名称（在空腔中间）
  for (const seg of cavityIntervals) {
    const lx = projToX(seg.left), rx = projToX(seg.right);
    const midX = (lx + rx) / 2;
    sctx.fillStyle = '#e0e0e0';
    sctx.font = 'bold 11px Microsoft YaHei';
    sctx.textAlign = 'center';
    // 找到对应的坑名称
    for (const pd of pitDepths) {
      const pit = pd.pit;
      const pitCavityPath = [pitToClipperPath(pit)];
      const pitCavInt = mergeIntervals(clipperPathToProjections(pitCavityPath));
      if (pitCavInt.length > 0 && pitCavInt[0].left >= seg.left - 1 && pitCavInt[0].right <= seg.right + 1) {
        const pitDepth = pd.depthMm - slabThk;
        sctx.fillText(pit.name, midX, slabBottomY + pitDepth * scale / 2);
        break;
      }
    }
  }

  // 整体尺寸标注（在构件外围）
  if (concreteIntervals.length > 0) {
    const totalLeft = projToX(concreteIntervals[0].left);
    const totalRight = projToX(concreteIntervals[concreteIntervals.length - 1].right);
    const totalWidth = Math.round(concreteIntervals[concreteIntervals.length - 1].right - concreteIntervals[0].left);
    drawDimLine(sctx, totalLeft, slabTopY - 25, totalRight, slabTopY - 25, totalWidth + 'mm', CF);
  }

  if (membraneIntervals.length > 0) {
    const memLeft = projToX(membraneIntervals[0].left);
    const memRight = projToX(membraneIntervals[membraneIntervals.length - 1].right);
    const totalMemWidth = Math.round(membraneIntervals[membraneIntervals.length - 1].right - membraneIntervals[0].left);
    drawDimLine(sctx, memLeft, slabTopY - 40, memRight, slabTopY - 40, totalMemWidth + 'mm', MF);
  }

  // 深度标注（在最右侧膜外）
  if (membraneIntervals.length > 0) {
    const rightMemX = projToX(membraneIntervals[membraneIntervals.length - 1].right);
    const dimX = rightMemX + 30;
    drawDimLine(sctx, dimX, slabTopY, dimX, slabMemTopY + pitDepthPx + bottomThkPx + bottomMemThkPx, maxDepthMm + 'mm', CF);
  }

  // 标高标注
  for (const seg of concreteIntervals) {
    const lx = projToX(seg.left);
    drawElevMark(sctx, lx - 8, slabTopY, state.pits[0]?.topElev ?? 0, CF);
    break;
  }
  for (const seg of membraneIntervals) {
    const lx = projToX(seg.left);
    drawElevMark(sctx, lx - 8, slabMemTopY + pitDepthPx + bottomThkPx + bottomMemThkPx, state.pits[0]?.bottomElev ?? 0, CF);
    break;
  }

  sctx.fillStyle = '#e0e0e0';
  sctx.font = 'bold 12px Microsoft YaHei';
  sctx.textAlign = 'center';
  sctx.fillText('1-1 剖面图', sw / 2, 14);

  // 剖面标记：左边 1— ，右边 —1
  if (membraneIntervals.length > 0) {
    const leftX = projToX(membraneIntervals[0].left);
    const rightX = projToX(membraneIntervals[membraneIntervals.length - 1].right);
    const markY = slabTopY;
    const markH = slabMemTopY + pitDepthPx + bottomThkPx + bottomMemThkPx - slabTopY;

    sctx.strokeStyle = '#ffeb3b';
    sctx.lineWidth = 1.5;
    sctx.fillStyle = '#ffeb3b';
    sctx.font = 'bold 14px Microsoft YaHei';
    sctx.textAlign = 'center';
    sctx.textBaseline = 'middle';

    sctx.beginPath();
    sctx.moveTo(leftX, markY); sctx.lineTo(leftX - 25, markY);
    sctx.moveTo(leftX, markY + markH); sctx.lineTo(leftX - 25, markY + markH);
    sctx.stroke();

    sctx.fillText('1', leftX - 35, markY);
    sctx.fillText('1', leftX - 35, markY + markH);

    sctx.beginPath();
    sctx.moveTo(rightX, markY); sctx.lineTo(rightX + 25, markY);
    sctx.moveTo(rightX, markY + markH); sctx.lineTo(rightX + 25, markY + markH);
    sctx.stroke();

    sctx.fillText('1', rightX + 35, markY);
    sctx.fillText('1', rightX + 35, markY + markH);
  }

  drawPlanWithDimensions();
}

function rectLineIntersect(sl, rect, slNx, slNz) {
  const corners = [
    { x: rect.left, z: rect.top }, { x: rect.right, z: rect.top },
    { x: rect.right, z: rect.bottom }, { x: rect.left, z: rect.bottom }
  ];
  const edges = [[corners[0], corners[1]], [corners[1], corners[2]], [corners[2], corners[3]], [corners[3], corners[0]]];
  const projs = [];
  for (const [p1, p2] of edges) {
    const t = lineLineIntersect(sl.x1, sl.z1, sl.x2, sl.z2, p1.x, p1.z, p2.x, p2.z);
    if (t !== null && t >= 0 && t <= 1) {
      const ix = sl.x1 + t * (sl.x2 - sl.x1);
      const iz = sl.z1 + t * (sl.z2 - sl.z1);
      const proj = (ix - sl.x1) * slNx + (iz - sl.z1) * slNz;
      projs.push(proj);
    }
  }
  return projs;
}

function drawElevMark(ctx, x, y, elev, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 1;
  ctx.font = '10px Microsoft YaHei';
  ctx.textAlign = 'right';
  ctx.beginPath();
  ctx.moveTo(x, y - 18);
  ctx.lineTo(x, y);
  ctx.lineTo(x - 4, y - 4);
  ctx.stroke();
  ctx.fillText(elev.toFixed(2), x - 2, y - 20);
  ctx.restore();
}

function lineLineIntersect(x1, y1, x2, y2, x3, y3, x4, y4) {
  const denom = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
  if (Math.abs(denom) < 0.001) return null;
  const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / denom;
  const u = -((x1 - x2) * (y1 - y3) - (y1 - y2) * (x1 - x3)) / denom;
  if (u >= 0 && u <= 1) return t;
  return null;
}

function lineCircleIntersect(x1, y1, x2, y2, cx, cy, r) {
  const dx = x2 - x1, dy = y2 - y1;
  const fx = x1 - cx, fy = y1 - cy;
  const a = dx * dx + dy * dy;
  const b = 2 * (fx * dx + fy * dy);
  const c = fx * fx + fy * fy - r * r;
  const disc = b * b - 4 * a * c;
  if (disc < 0) return null;
  const sq = Math.sqrt(disc);
  return [(-b - sq) / (2 * a), (-b + sq) / (2 * a)];
}

// ============ 导出功能 ============
window.exportDXF = function() {
  let dxf = '0\nSECTION\n2\nHEADER\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n';

  for (const pit of state.pits) {
    if (pit.type === 'rect') {
      const b = getPitBounds(pit);
      dxf += `0\nLWPOLYLINE\n8\n0\n90\n4\n70\n1\n`;
      dxf += `10\n${b.left}\n20\n${b.top}\n10\n${b.right}\n20\n${b.top}\n10\n${b.right}\n20\n${b.bottom}\n10\n${b.left}\n20\n${b.bottom}\n`;
    } else {
      dxf += `0\nCIRCLE\n8\n0\n10\n${pit.cx}\n20\n${pit.cy}\n40\n${pit.diameter / 2}\n`;
    }
  }

  dxf += '0\nENDSEC\n0\nEOF\n';

  const blob = new Blob([dxf], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'pit-detail.dxf'; a.click();
  URL.revokeObjectURL(url);
};

window.exportPNG = function() {
  const pc = document.getElementById('planCanvas');
  const sc = document.getElementById('sectionCanvas');

  const expCanvas = document.createElement('canvas');
  expCanvas.width = pc.width + sc.width + 40 * devicePixelRatio;
  expCanvas.height = Math.max(pc.height, sc.height) + 60 * devicePixelRatio;
  const ectx = expCanvas.getContext('2d');
  ectx.fillStyle = '#fff';
  ectx.fillRect(0, 0, expCanvas.width, expCanvas.height);
  ectx.drawImage(pc, 10 * devicePixelRatio, 10 * devicePixelRatio);
  ectx.drawImage(sc, pc.width + 30 * devicePixelRatio, 10 * devicePixelRatio);

  const url = expCanvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url; a.download = 'pit-detail.png'; a.click();
};
