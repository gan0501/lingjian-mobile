<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
html,body{
  background:#ffffff;
  height:100%;width:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  touch-action:none;
}
#container{width:100%;height:100%;position:relative;touch-action:none;}
#status{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#1d4ed8;font-family:sans-serif;font-size:14px;
  text-align:center;z-index:9999;pointer-events:none;
  text-shadow:0 0 12px #1d4ed8;
}
</style>
</head>
<body>
<div id="container"></div>

<script src="file:///android_asset/three-all.js"></script>
<script>
var scene, camera, renderer, clock;
var buildings = {};
var connectionLines = [];

var DEFAULT_H = -25;
var DEFAULT_V = 5;
var MIN_V = 5;
var MAX_V = 45;

var cameraControl = {
  horizontalAngle: DEFAULT_H,
  verticalAngle: DEFAULT_V,
  radius: 400,
  target: new THREE.Vector3(28, 80, 0)
};

var cameraResetState = {
  active: false,
  delayTimer: null,
  startTime: 0,
  duration: 1000,
  fromH: DEFAULT_H,
  fromV: DEFAULT_V
};

function cancelReset() {
  var rs = cameraResetState;
  if (rs.delayTimer) { clearTimeout(rs.delayTimer); rs.delayTimer = null; }
  rs.active = false;
}

function scheduleReset() {
  var rs = cameraResetState;
  cancelReset();
  rs.delayTimer = setTimeout(function() {
    rs.fromH = cameraControl.horizontalAngle;
    rs.fromV = cameraControl.verticalAngle;
    rs.startTime = performance.now();
    rs.active = true;
  }, 2000);
}

function updateCameraPosition() {
  var ctrl = cameraControl;
  ctrl.verticalAngle = Math.max(MIN_V, Math.min(MAX_V, ctrl.verticalAngle));
  var hRad = ctrl.horizontalAngle * Math.PI / 180;
  var vRad = ctrl.verticalAngle * Math.PI / 180;
  var horizontalDist = ctrl.radius * Math.cos(vRad);
  var height = ctrl.radius * Math.sin(vRad);
  var x = horizontalDist * Math.sin(hRad);
  var z = horizontalDist * Math.cos(hRad);
  var y = height + ctrl.target.y;
  camera.position.set(x, y, z);
  camera.lookAt(ctrl.target);
}

function init() {
  var container = document.getElementById('container');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);
  scene.fog = new THREE.Fog(0xffffff, 300, 1500);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
  updateCameraPosition();

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 3));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace || 'srgb';
  renderer.toneMapping = THREE.NoToneMapping;
  container.appendChild(renderer.domElement);

  buildLights();
  buildFloor();
  buildParkBuildings();
  buildConnections();

  clock = new THREE.Clock();
  animate();

  window.addEventListener('resize', onResize);
  setupControls();
}

function setupControls() {
  var canvas = renderer.domElement;
  var isDragging = false;
  var hasMoved = false;
  var startX = 0, startY = 0, startHAngle = 0, startVAngle = 0;
  canvas.style.touchAction = 'none';

  // Raycaster for click detection
  var raycaster = new THREE.Raycaster();
  var mouse = new THREE.Vector2();

  function getIntersects(clientX, clientY) {
    var rect = canvas.getBoundingClientRect();
    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    var buildingList = Object.values(buildings);
    return raycaster.intersectObjects(buildingList, true);
  }

  function handleClick(clientX, clientY) {
    var intersects = getIntersects(clientX, clientY);
    console.log('handleClick called, intersects:', intersects.length);
    if (intersects.length > 0) {
      var obj = intersects[0].object;
      console.log('First intersect object:', obj.type, obj.userData);
      while (obj.parent && !obj.userData.name) {
        obj = obj.parent;
        console.log('Traversing to parent:', obj.type, obj.userData);
      }
      if (obj.userData.name) {
        console.log('Found building with name:', obj.userData.name);
        handleBuildingClick(obj);
      } else {
        console.log('No building name found');
      }
    }
  }

  canvas.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      isDragging = false;
      hasMoved = false;
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      startHAngle = cameraControl.horizontalAngle;
      startVAngle = cameraControl.verticalAngle;
      e.preventDefault();
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    if (e.touches.length !== 1) return;
    var deltaX = e.touches[0].clientX - startX;
    var deltaY = e.touches[0].clientY - startY;
    
    if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
      isDragging = true;
      hasMoved = true;
      cancelReset();
    }
    
    if (isDragging) {
      cameraControl.horizontalAngle = startHAngle - deltaX * 0.5;
      cameraControl.verticalAngle = startVAngle + deltaY * 0.4;
      updateCameraPosition();
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    if (!hasMoved) {
      var touch = e.changedTouches[0];
      handleClick(touch.clientX, touch.clientY);
    }
    isDragging = false;
    scheduleReset();
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchcancel', function(e) {
    isDragging = false; scheduleReset(); e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('mousedown', function(e) {
    isDragging = false;
    hasMoved = false;
    startX = e.clientX; startY = e.clientY;
    startHAngle = cameraControl.horizontalAngle;
    startVAngle = cameraControl.verticalAngle;
  });

  canvas.addEventListener('mousemove', function(e) {
    var deltaX = e.clientX - startX;
    var deltaY = e.clientY - startY;
    
    if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
      isDragging = true;
      hasMoved = true;
    }
    
    if (!isDragging) return;
    cameraControl.horizontalAngle = startHAngle - deltaX * 0.5;
    cameraControl.verticalAngle = startVAngle + deltaY * 0.4;
    updateCameraPosition();
  });

  canvas.addEventListener('mouseup', function(e) {
    if (!hasMoved) {
      handleClick(e.clientX, e.clientY);
    }
    isDragging = false; scheduleReset();
  });
  canvas.addEventListener('mouseleave', function() { isDragging = false; scheduleReset(); });

  document.body.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive: false });
}

function buildLights() {
  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  var dir = new THREE.DirectionalLight(0xffffff, 2.5);
  dir.position.set(100, 200, 100);
  dir.castShadow = true;
  dir.shadow.mapSize.width = 1024;
  dir.shadow.mapSize.height = 1024;
  dir.shadow.camera.near = 0.5;
  dir.shadow.camera.far = 600;
  dir.shadow.camera.left = -200;
  dir.shadow.camera.right = 200;
  dir.shadow.camera.top = 200;
  dir.shadow.camera.bottom = -200;
  scene.add(dir);

  var fill = new THREE.DirectionalLight(0x6688cc, 0.8);
  fill.position.set(-150, 80, -100);
  scene.add(fill);
  var back = new THREE.DirectionalLight(0xffffff, 0.8);
  back.position.set(0, 50, 200);
  scene.add(back);
}

function buildFloor() {
  var canvas = document.createElement('canvas');
  canvas.width = 1024; canvas.height = 1024;
  var ctx = canvas.getContext('2d');
  var radGrad = ctx.createRadialGradient(512, 512, 0, 512, 512, 512);
  radGrad.addColorStop(0, '#e4e7e6');
  radGrad.addColorStop(0.25, '#dcdedd');
  radGrad.addColorStop(0.5, '#dcdedd');
  radGrad.addColorStop(0.75, 'rgba(220,222,221,0.5)');
  radGrad.addColorStop(0.9, 'rgba(220,222,221,0.15)');
  radGrad.addColorStop(1, 'rgba(220,222,221,0)');
  ctx.fillStyle = radGrad;
  ctx.fillRect(0, 0, 1024, 1024);
  for(var i=0; i<=1024; i+=64){
    var dist = Math.abs(i - 512) / 512;
    var alpha = Math.max(0, 0.05 * (1 - dist));
    ctx.strokeStyle = 'rgba(148,163,184,' + alpha + ')';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 1024); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(1024, i); ctx.stroke();
  }
  var tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.ClampToEdgeWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;

  var floor = new THREE.Mesh(
    new THREE.CircleGeometry(600, 64),
    new THREE.MeshStandardMaterial({
      map: tex,
      roughness: 0.85,
      metalness: 0.05,
      transparent: true,
      alphaTest: 0.01
    })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -1;
  floor.receiveShadow = true;
  scene.add(floor);
}

function createFaceTexture(text, canvasW, canvasH, alignCenter, withBlueStrip) {
  var canvas = document.createElement('canvas');
  canvas.width = canvasW;
  canvas.height = canvasH;
  var ctx = canvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvasW, canvasH);

  if (withBlueStrip) {
    ctx.fillStyle = '#1d4ed8';
    ctx.fillRect(0, 0, canvasW, Math.round(canvasH * 0.06));
  }

  var fontSize = Math.round(Math.min(canvasW, canvasH) * 0.12);
  ctx.font = 'bold ' + fontSize + 'px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  ctx.fillStyle = '#1d4ed8';

  if (alignCenter) {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, canvasW / 2, canvasH / 2);
  } else {
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(text, Math.round(fontSize * 0.3), Math.round(fontSize * 0.3));
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, canvasW, canvasH);

  var texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;
  return texture;
}

function createBoxBuilding(x, z, w, h, d, accentColor, name) {
  var group = new THREE.Group();
  group.userData = { name: name, type: 'building', w: w, h: h, d: d };

  var topTex = createFaceTexture(name, 512, 512, true, true);
  var frontTex = createFaceTexture(name, 512, 256, false, false);

  var topMat = new THREE.MeshStandardMaterial({ map: topTex, roughness: 0.3, metalness: 0.1 });
  var frontMat = new THREE.MeshStandardMaterial({ map: frontTex, roughness: 0.3, metalness: 0.1 });
  var bottomMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.5 });

  var materials = [frontMat, frontMat, topMat, bottomMat, frontMat, frontMat];

  var bodyGeo = new THREE.BoxGeometry(w, h, d);
  var body = new THREE.Mesh(bodyGeo, materials);
  body.position.y = h / 2;
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  var edgeGeo = new THREE.EdgesGeometry(bodyGeo);
  var edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
  var edges = new THREE.LineSegments(edgeGeo, edgeMat);
  edges.position.y = h / 2;
  group.add(edges);

  group.position.set(x, 0, z);
  return group;
}

function buildParkBuildings() {
  var S = 0.4;

  buildings.hq = createBoxBuilding(
    (0 + 70) * S, (-70 + 70) * S,
    140 * S, 90 * S * 1.5, 140 * S,
    0x1d4ed8, '总部大楼'
  );
  scene.add(buildings.hq);

  buildings.factory = createBoxBuilding(
    (-450 + 180) * S, (-350 + 120) * S,
    360 * S, 21 * S, 240 * S,
    0xfbbf24, '生产车间'
  );
  scene.add(buildings.factory);

  buildings.sales = createBoxBuilding(
    (-350 + 120) * S, (150 + 60) * S,
    240 * S, 30 * S, 120 * S,
    0xf87171, '销售据点'
  );
  scene.add(buildings.sales);

  buildings.procure = createBoxBuilding(
    (210 + 120) * S, (90 + 60) * S,
    240 * S, 30 * S, 120 * S,
    0x34d399, '采购中心'
  );
  scene.add(buildings.procure);

  buildings.admin = createBoxBuilding(
    (200 + 140) * S, (-220 + 50) * S,
    280 * S, 30 * S, 100 * S,
    0x22d3ee, '行政大厅'
  );
  scene.add(buildings.admin);

  buildings.rd = createBoxBuilding(
    (-50 + 100) * S, (-460 + 80) * S,
    200 * S, 30 * S, 160 * S,
    0xa78bfa, '研发中心'
  );
  scene.add(buildings.rd);
}

function createDashedLineTexture() {
  var canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 16;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 64, 16);
  ctx.fillStyle = 'rgba(29, 78, 216, 0.7)';
  ctx.fillRect(0, 3, 32, 10);
  var tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

function addGroundLineSegment(x1, z1, x2, z2, lineWidth, dashTex, pulsePhase) {
  var dx = x2 - x1;
  var dz = z2 - z1;
  var len = Math.sqrt(dx * dx + dz * dz);
  if (len < 0.1) return;

  var isHorizontal = Math.abs(dz) < 0.1;
  var isVertical = Math.abs(dx) < 0.1;

  var geo;
  if (isHorizontal) {
    geo = new THREE.PlaneGeometry(len, lineWidth);
  } else if (isVertical) {
    geo = new THREE.PlaneGeometry(lineWidth, len);
  } else {
    geo = new THREE.PlaneGeometry(len, lineWidth);
  }

  var bgMat = new THREE.MeshBasicMaterial({ color: 0x1d4ed8, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
  var bgPlane = new THREE.Mesh(geo, bgMat);
  bgPlane.rotation.x = -Math.PI / 2;
  bgPlane.position.set((x1 + x2) / 2, 0.2, (z1 + z2) / 2);

  if (!isHorizontal && !isVertical) {
    var angle = Math.atan2(dx, dz);
    bgPlane.rotation.z = angle;
  }
  scene.add(bgPlane);

  var dashMat = new THREE.MeshBasicMaterial({ map: dashTex, color: 0x1d4ed8, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
  var dashPlane = new THREE.Mesh(geo, dashMat);
  dashPlane.rotation.x = -Math.PI / 2;
  dashPlane.position.set((x1 + x2) / 2, 0.3, (z1 + z2) / 2);

  if (!isHorizontal && !isVertical) {
    dashPlane.rotation.z = angle;
  }

  if (isHorizontal) {
    dashMat.map.repeat.set(len / 16, 1);
  } else if (isVertical) {
    dashMat.map.repeat.set(1, len / 16);
  } else {
    dashMat.map.repeat.set(len / 16, 1);
  }

  dashPlane.userData = { pulsePhase: pulsePhase, isPulseLine: true, lineLen: len, isH: isHorizontal, isV: isVertical };
  scene.add(dashPlane);
  connectionLines.push(dashPlane);
}

function buildConnections() {
  var lineWidth = 2.5;
  var dashTex = createDashedLineTexture();
  var phaseIdx = 0;

  var hq = buildings.hq;
  var hqX = hq.position.x;
  var hqZ = hq.position.z;
  var hqW = hq.userData.w;
  var hqD = hq.userData.d;

  var depts = [
    { key: 'factory' },
    { key: 'sales' },
    { key: 'procure' },
    { key: 'admin' },
    { key: 'rd' }
  ];

  depts.forEach(function(dept) {
    var b = buildings[dept.key];
    var bx = b.position.x;
    var bz = b.position.z;
    var bw = b.userData.w;
    var bd = b.userData.d;

    var dx = hqX - bx;
    var dz = hqZ - bz;

    var startX, startZ, cornerX, cornerZ;

    if (Math.abs(dx) >= Math.abs(dz)) {
      if (dx > 0) {
        startX = bx + bw / 2;
      } else {
        startX = bx - bw / 2;
      }
      startZ = bz;
      cornerX = startX;
      cornerZ = hqZ;

      var distToLeft = Math.abs(cornerX - (hqX - hqW / 2));
      var distToRight = Math.abs(cornerX - (hqX + hqW / 2));
      var endX = distToLeft < distToRight ? hqX - hqW / 2 : hqX + hqW / 2;
      var endZ = hqZ;

      addGroundLineSegment(startX, startZ, cornerX, cornerZ, lineWidth, dashTex, phaseIdx);
      addGroundLineSegment(cornerX, cornerZ, endX, endZ, lineWidth, dashTex, phaseIdx + 0.1);
    } else {
      startX = bx;
      if (dz > 0) {
        startZ = bz + bd / 2;
      } else {
        startZ = bz - bd / 2;
      }
      cornerX = hqX;
      cornerZ = startZ;

      var distToTop = Math.abs(cornerZ - (hqZ - hqD / 2));
      var distToBottom = Math.abs(cornerZ - (hqZ + hqD / 2));
      var endZ = distToTop < distToBottom ? hqZ - hqD / 2 : hqZ + hqD / 2;
      var endX = hqX;

      addGroundLineSegment(startX, startZ, cornerX, cornerZ, lineWidth, dashTex, phaseIdx);
      addGroundLineSegment(cornerX, cornerZ, endX, endZ, lineWidth, dashTex, phaseIdx + 0.1);
    }

    phaseIdx += 0.5;
  });
}

function handleBuildingClick(obj) {
  animateClick(obj);
  var buildingName = obj.userData.name;
  if(window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({
      action: 'building_click',
      name: buildingName
    }));
  }
}

function animateClick(obj) {
  var originalScale = obj.scale.x;
  var t = 0;
  function bounce(){
    t += 0.1;
    var scale = originalScale + Math.sin(t * 8) * 0.05 * Math.exp(-t * 2);
    obj.scale.set(scale, scale, scale);
    if(t < 2) requestAnimationFrame(bounce);
    else obj.scale.set(originalScale, originalScale, originalScale);
  }
  bounce();
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  var time = clock.getElapsedTime();

  var rs = cameraResetState;
  if (rs.active) {
    var elapsed = performance.now() - rs.startTime;
    var t = Math.min(elapsed / rs.duration, 1);
    var ease = t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1;
    cameraControl.horizontalAngle = rs.fromH + (DEFAULT_H - rs.fromH) * ease;
    cameraControl.verticalAngle = rs.fromV + (DEFAULT_V - rs.fromV) * ease;
    updateCameraPosition();
    if (t >= 1) rs.active = false;
  }

  connectionLines.forEach(function(line) {
    var phase = line.userData.pulsePhase;
    line.material.opacity = 0.3 + Math.sin(time * 2 + phase) * 0.2;
    if(line.material.map) {
      if(line.userData.isH) {
        line.material.map.offset.x = time * 0.5 + phase * 0.3;
      } else if(line.userData.isV) {
        line.material.map.offset.y = time * 0.5 + phase * 0.3;
      } else {
        line.material.map.offset.x = time * 0.5 + phase * 0.3;
      }
      line.material.map.needsUpdate = true;
    }
  });

  renderer.render(scene, camera);
}

setTimeout(init, 100);
</script>
</body>
</html>
